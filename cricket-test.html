<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cricket Test</title>
<style>
body{font-family:-apple-system,sans-serif;background:#000;color:#fff;padding:20px;line-height:1.4}
.result{background:#1c1c1e;padding:12px;border-radius:8px;margin:10px 0;white-space:pre-wrap;font-family:monospace;font-size:11px;word-break:break-all}
.ok{border-left:4px solid #30d158}
.fail{border-left:4px solid #ff453a}
.empty{border-left:4px solid #ffd60a}
</style>
</head>
<body>
<h1>Cricket Test</h1>
<p>Testing ESPN cricket league IDs. Wait 90s.</p>
<div id="out"></div>
<script>
const out = document.getElementById('out');
const endpoints = [
  { path: 'cricket/8048',  desc: 'IPL' },
  { path: 'cricket/23694', desc: 'unknown 23694' },
  { path: 'cricket/8039',  desc: 'Internationals?' },
  { path: 'cricket/8044',  desc: 'T20I?' },
  { path: 'cricket/8047',  desc: 'ODI?' },
  { path: 'cricket/19429', desc: 'Big Bash?' },
  { path: 'cricket/all',   desc: 'all' }
];
const proxies = [
  u => 'https://corsproxy.io/?' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
  u => 'https://thingproxy.freeboard.io/fetch/' + u
];
const proxyNames = ['corsproxy','allorigins','codetabs','thingproxy'];

async function tryOne(ep) {
  const url = 'https://site.api.espn.com/apis/site/v2/sports/' + ep.path + '/scoreboard';
  const div = document.createElement('div');
  div.className = 'result';
  div.textContent = ep.path + ' (' + ep.desc + ') ... loading';
  out.appendChild(div);
  const results = [];
  for (let i = 0; i < proxies.length; i++) {
    try {
      const r = await fetch(proxies[i](url));
      if (!r.ok) { results.push(proxyNames[i] + ': HTTP ' + r.status); continue; }
      const j = await r.json();
      const events = (j.events || []);
      const leagueName = (j.leagues && j.leagues[0] && j.leagues[0].name) || '?';
      if (events.length === 0) {
        results.push(proxyNames[i] + ': OK (' + leagueName + ') 0 events');
      } else {
        results.push(proxyNames[i] + ': FOUND ' + events.length + ' (' + leagueName + ')');
        div.className = 'result ok';
        div.textContent = ep.path + ' (' + ep.desc + ')\n' + results.join('\n') + '\nFirst: ' + events[0].name + '\nDate: ' + events[0].date;
        return;
      }
    } catch (e) {
      results.push(proxyNames[i] + ': ' + e.message);
    }
  }
  const anyEmpty = results.some(r => r.includes('0 events'));
  div.className = 'result ' + (anyEmpty ? 'empty' : 'fail');
  div.textContent = ep.path + ' (' + ep.desc + ')\n' + results.join('\n');
}

(async () => {
  for (const ep of endpoints) await tryOne(ep);
})();
</script>
</body>
</html>
