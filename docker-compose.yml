# Fly Intelligence Platform — local or cloud deployment
services:
  fly-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - flytime-data:/data
    environment:
      - FLYTIME_DB_PATH=/data/flytime_engine.db
      - HOST=0.0.0.0
      - PORT=8787
    restart: unless-stopped

volumes:
  flytime-data:
