<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>StatFly feed research</title>
<style>
  :root {
    --bg: #000;
    --card: #111114;
    --ok: #30d158;
    --warn: #ffd60a;
    --bad: #ff453a;
    --text: #fff;
    --text-2: rgba(235,235,245,0.6);
    --sep: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; min-height: 100%; }
  body { padding: 16px; padding-bottom: 80px; font-size: 15px; line-height: 1.4; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: var(--text-2); font-size: 13px; margin-bottom: 16px; }
  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  button {
    background: var(--card); color: var(--text); border: 1px solid var(--sep);
    padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  button:active { opacity: 0.6; }
  button.primary { background: var(--ok); color: #000; border-color: var(--ok); }
  .summary {
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 16px; font-size: 13px; color: var(--text-2);
    border: 1px solid var(--sep);
  }
  .summary b { color: var(--text); }
  .summary .ok { color: var(--ok); }
  .summary .warn { color: var(--warn); }
  .summary .bad { color: var(--bad); }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text-2); margin: 18px 0 8px 4px; text-transform: uppercase;
  }
  .row {
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 8px; border: 1px solid var(--sep);
    border-left-width: 4px;
  }
  .row.ok   { border-left-color: var(--ok); }
  .row.warn { border-left-color: var(--warn); }
  .row.bad  { border-left-color: var(--bad); }
  .row.pending { border-left-color: var(--text-2); opacity: 0.7; }
  .row-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .label { font-weight: 700; font-size: 15px; }
  .endpoint { color: var(--text-2); font-size: 12px; font-family: ui-monospace, monospace; }
  .status { margin-left: auto; font-size: 12px; font-weight: 600; }
  .status.ok { color: var(--ok); }
  .status.warn { color: var(--warn); }
  .status.bad { color: var(--bad); }
  .meta { color: var(--text-2); font-size: 12px; margin-top: 6px; }
  .sample { color: var(--text); font-size: 13px; margin-top: 4px; }
  details { margin-top: 6px; }
  summary { color: var(--text-2); font-size: 12px; cursor: pointer; padding: 4px 0; }
  pre {
    background: #000; border: 1px solid var(--sep); border-radius: 8px;
    padding: 8px; font-size: 11px; overflow-x: auto; margin-top: 4px;
    color: var(--text-2); font-family: ui-monospace, monospace;
    max-height: 300px; overflow-y: auto;
  }
</style>
</head>
<body>
  <h1>StatFly feed research</h1>
  <div class="sub">Tests candidate ESPN slugs for ghost leagues currently in the search UI without feeds. Green = working slug, has events. Yellow = slug works, off-season. Red = wrong slug or league not on ESPN API.</div>

  <div class="controls">
    <button class="primary" id="run">Run all</button>
    <button id="rerun-bad">Re-run failures</button>
  </div>

  <div class="summary" id="summary">Tap Run all to start.</div>

  <div id="rows"></div>

<script>
// Candidate slugs to test. Grouped by section for display.
var SECTIONS = [
  {
    title: 'Soccer - European leagues',
    feeds: [
      { sport:'soccer', league:'eng.2', label:'EFL Championship' },
      { sport:'soccer', league:'eng.w.1', label:"Women's Super League" },
      { sport:'soccer', league:'ned.1', label:'Eredivisie (NL)' },
      { sport:'soccer', league:'por.1', label:'Primeira Liga (PT)' },
      { sport:'soccer', league:'sco.1', label:'Scottish Premiership' },
      { sport:'soccer', league:'tur.1', label:'Super Lig (TR)' },
    ]
  },
  {
    title: 'Soccer - Americas',
    feeds: [
      { sport:'soccer', league:'bra.1', label:'Brasileirao' },
      { sport:'soccer', league:'bra.copa_do_brazil', label:'Copa do Brasil (v1)' },
      { sport:'soccer', league:'bra.copa.brazil', label:'Copa do Brasil (v2)' },
      { sport:'soccer', league:'arg.1', label:'Liga Profesional (AR)' },
      { sport:'soccer', league:'mex.1', label:'Liga MX' },
      { sport:'soccer', league:'conmebol.libertadores', label:'Copa Libertadores' },
    ]
  },
  {
    title: 'Soccer - Other',
    feeds: [
      { sport:'soccer', league:'irl.1', label:'League of Ireland' },
      { sport:'soccer', league:'aus.1', label:'A-League (AU)' },
      { sport:'soccer', league:'ind.1', label:'ISL Football (IN)' },
      { sport:'soccer', league:'rsa.1', label:'PSL Football (ZA)' },
    ]
  },
  {
    title: 'Cricket',
    feeds: [
      { sport:'cricket', league:'8044', label:'BBL (au, seasonal Dec-Jan)' },
      { sport:'cricket', league:'22810', label:'SA20 (v1)' },
      { sport:'cricket', league:'24249', label:'SA20 (v2)' },
      { sport:'cricket', league:'8043', label:'PSL (v1)' },
      { sport:'cricket', league:'21766', label:'PSL (v2)' },
    ]
  },
  {
    title: 'Rugby & other',
    feeds: [
      { sport:'rugby', league:'super-rugby', label:'Super Rugby (slug v1)' },
      { sport:'rugby', league:'1', label:'Super Rugby (id v1)' },
      { sport:'rugby', league:'271937', label:'Super Rugby (id v2)' },
      { sport:'rugby', league:'180659', label:'Six Nations (id v1)' },
      { sport:'rugby', league:'164205', label:'Six Nations (id v2)' },
      { sport:'rugby', league:'six-nations', label:'Six Nations (slug)' },
    ]
  },
];

// Flatten for indexing
var FEEDS = [];
SECTIONS.forEach(function(s) {
  s.feeds.forEach(function(f) {
    f._section = s.title;
    FEEDS.push(f);
  });
});

function proxyUrls(url) {
  return [
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
    'https://thingproxy.freeboard.io/fetch/' + url,
    url,
  ];
}

function proxyName(u) {
  if (u.indexOf('corsproxy.io') > -1) return 'corsproxy';
  if (u.indexOf('allorigins')   > -1) return 'allorigins';
  if (u.indexOf('codetabs')     > -1) return 'codetabs';
  if (u.indexOf('thingproxy')   > -1) return 'thingproxy';
  return 'direct';
}

function espnFetch(sport, league) {
  var url = 'https://site.api.espn.com/apis/site/v2/sports/' + sport + '/' + league + '/scoreboard';
  var proxies = proxyUrls(url);
  return new Promise(function(resolve) {
    var done = false;
    var pending = proxies.length;
    var errors = [];
    proxies.forEach(function(proxyUrl) {
      var ctrl = new AbortController();
      var timer = setTimeout(function(){ ctrl.abort(); }, 10000);
      fetch(proxyUrl, { signal: ctrl.signal }).then(function(res) {
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      }).then(function(text) {
        var json;
        try { json = JSON.parse(text); } catch(e) { throw new Error('non-JSON'); }
        if (json.contents) {
          try { json = JSON.parse(json.contents); } catch(e) { throw new Error('non-JSON in contents'); }
        }
        if (done) return;
        if (json && typeof json === 'object' && 'events' in json) {
          done = true;
          resolve({ ok: true, json: json, proxy: proxyName(proxyUrl), errors: errors });
        } else if (json && typeof json === 'object' && json.leagues) {
          // Got JSON with leagues but no events key - still useful info
          done = true;
          resolve({ ok: true, json: { events: [], leagues: json.leagues }, proxy: proxyName(proxyUrl), errors: errors, partial: true });
        } else {
          throw new Error('no events key');
        }
      }).catch(function(err) {
        clearTimeout(timer);
        errors.push(proxyName(proxyUrl) + ': ' + err.message);
        pending--;
        if (pending === 0 && !done) {
          done = true;
          resolve({ ok: false, errors: errors });
        }
      });
    });
  });
}

function classify(result) {
  if (!result.ok) return 'bad';
  var events = (result.json && result.json.events) || [];
  if (events.length === 0) return 'warn';
  return 'ok';
}

function describe(result) {
  if (!result.ok) return { status: 'FAIL', detail: 'all proxies failed' };
  var events = (result.json && result.json.events) || [];
  var leagueName = result.json && result.json.leagues && result.json.leagues[0] && result.json.leagues[0].name;
  if (events.length === 0) {
    return { status: '0 events', detail: leagueName ? ('endpoint OK, league recognised as: ' + leagueName + ' (off-season or no current events)') : 'endpoint OK, no current events' };
  }
  return { status: events.length + ' events', detail: 'first via ' + result.proxy + (leagueName ? ' - ' + leagueName : '') };
}

function sampleEvent(ev) {
  if (!ev) return '';
  var name = ev.name || ev.shortName || '(unnamed event)';
  var status = ev.status && ev.status.type && (ev.status.type.shortDetail || ev.status.type.description) || '';
  return name + (status ? '  ' + status : '');
}

function renderRow(feed, idx) {
  var row = document.getElementById('row-' + idx);
  if (row) return row;
  row = document.createElement('div');
  row.className = 'row pending';
  row.id = 'row-' + idx;
  row.innerHTML =
    '<div class="row-head">' +
      '<span class="label">' + feed.label + '</span>' +
      '<span class="endpoint">' + feed.sport + '/' + feed.league + '</span>' +
      '<span class="status">...</span>' +
    '</div>' +
    '<div class="body"></div>';
  document.getElementById('rows').appendChild(row);
  return row;
}

function updateRow(idx, feed, result) {
  var row = document.getElementById('row-' + idx);
  if (!row) return;
  var cls = classify(result);
  row.className = 'row ' + cls;
  var d = describe(result);
  row.querySelector('.status').className = 'status ' + cls;
  row.querySelector('.status').textContent = d.status;

  var body = row.querySelector('.body');
  body.innerHTML = '';

  var meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = d.detail;
  body.appendChild(meta);

  if (result.ok) {
    var events = (result.json && result.json.events) || [];
    if (events.length > 0) {
      var sample = document.createElement('div');
      sample.className = 'sample';
      sample.textContent = sampleEvent(events[0]);
      body.appendChild(sample);
    }
  } else {
    var det = document.createElement('details');
    var sum = document.createElement('summary');
    sum.textContent = 'Show proxy errors (' + result.errors.length + ')';
    det.appendChild(sum);
    var pre = document.createElement('pre');
    pre.textContent = result.errors.join('\n');
    det.appendChild(pre);
    body.appendChild(det);
  }
}

var results = {};

function updateSummary(running) {
  var ok = 0, warn = 0, bad = 0, pending = 0;
  for (var i = 0; i < FEEDS.length; i++) {
    var r = results[i];
    if (!r) { pending++; continue; }
    var c = classify(r);
    if (c === 'ok') ok++;
    else if (c === 'warn') warn++;
    else bad++;
  }
  var html = (running ? '<b>Running...</b>   ' : '<b>Done.</b>   ') +
    '<span class="ok">' + ok + ' OK</span>   ' +
    '<span class="warn">' + warn + ' empty</span>   ' +
    '<span class="bad">' + bad + ' failed</span>' +
    (pending > 0 ? '   ' + pending + ' pending' : '');
  document.getElementById('summary').innerHTML = html;
}

function runOne(idx) {
  var feed = FEEDS[idx];
  renderRow(feed, idx);
  return espnFetch(feed.sport, feed.league).then(function(result) {
    results[idx] = result;
    updateRow(idx, feed, result);
    updateSummary(true);
  });
}

function renderSections() {
  var container = document.getElementById('rows');
  container.innerHTML = '';
  var idx = 0;
  SECTIONS.forEach(function(s) {
    var title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = s.title;
    container.appendChild(title);
    s.feeds.forEach(function(f) {
      renderRow(f, idx);
      idx++;
    });
  });
}

function runAll() {
  results = {};
  renderSections();
  updateSummary(true);
  var promises = FEEDS.map(function(_, i) { return runOne(i); });
  Promise.all(promises).then(function() { updateSummary(false); });
}

function rerunBad() {
  var promises = [];
  for (var i = 0; i < FEEDS.length; i++) {
    var r = results[i];
    if (!r || classify(r) !== 'ok') {
      var row = document.getElementById('row-' + i);
      if (row) {
        row.className = 'row pending';
        row.querySelector('.status').textContent = '...';
        row.querySelector('.status').className = 'status';
      }
      promises.push(runOne(i));
    }
  }
  if (promises.length === 0) {
    document.getElementById('summary').innerHTML = '<b>Nothing to re-run.</b> All feeds returned events.';
    return;
  }
  updateSummary(true);
  Promise.all(promises).then(function() { updateSummary(false); });
}

document.getElementById('run').addEventListener('click', runAll);
document.getElementById('rerun-bad').addEventListener('click', rerunBad);
renderSections();
</script>
</body>
</html>
