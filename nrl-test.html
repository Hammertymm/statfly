<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NRL Endpoint Test</title>
<style>
body{font-family:-apple-system,sans-serif;background:#000;color:#fff;padding:20px;line-height:1.4}
h2{color:#30d158;margin-top:30px}
.result{background:#1c1c1e;padding:12px;border-radius:8px;margin:10px 0;white-space:pre-wrap;font-family:monospace;font-size:12px;word-break:break-all}
.ok{border-left:4px solid #30d158}
.fail{border-left:4px solid #ff453a}
.empty{border-left:4px solid #ffd60a}
</style>
</head>
<body>
<h1>NRL Endpoint Test</h1>
<p>Testing several possible NRL/rugby endpoints. Wait 30 seconds.</p>
<div id="out"></div>
<script>
const out = document.getElementById('out');
const endpoints = [
  'rugby/3',
  'rugby/nrl',
  'rugby/league/nrl',
  'rugby-league/nrl',
  'rugby/270557'
];
const proxy = (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`;

async function test(path) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard`;
  const div = document.createElement('div');
  div.className = 'result';
  div.textContent = path + ' ... loading';
  out.appendChild(div);
  try {
    const r = await fetch(proxy(url));
    if (!r.ok) {
      div.className = 'result fail';
      div.textContent = path + '\nHTTP ' + r.status + ' ' + r.statusText;
      return;
    }
    const j = await r.json();
    const count = (j.events || []).length;
    if (count === 0) {
      div.className = 'result empty';
      div.textContent = path + '\nOK but 0 events. League name: ' + (j.leagues && j.leagues[0] && j.leagues[0].name);
    } else {
      div.className = 'result ok';
      const first = j.events[0];
      div.textContent = path + '\nFOUND ' + count + ' events\nLeague: ' + (j.leagues && j.leagues[0] && j.leagues[0].name) + '\nFirst event: ' + first.name + '\nDate: ' + first.date;
    }
  } catch (e) {
    div.className = 'result fail';
    div.textContent = path + '\nERROR: ' + e.message;
  }
}

(async () => {
  for (const p of endpoints) await test(p);
})();
</script>
</body>
</html>
